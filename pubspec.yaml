name: advanced_calculator
description: Ultimate cross-platform calculator with Persian support.
publish_to: 'none'
version: 3.1.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  math_expressions: ^2.4.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
